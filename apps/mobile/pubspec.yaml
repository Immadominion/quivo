name: quivo
description: "Quivo — play a live game show on your phone, win real crypto on-chain."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # state + navigation (2026 recommended)
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # realtime (JSON gateway) + solana (throtl-proven)
  web_socket_channel: ^3.0.1
  solana: ^0.31.2+1 # 0.31.x line pairs with solana_mobile_client (freezed_annotation ^2); also web3flutter-recommended
  solana_mobile_client: ^0.1.2 # Mobile Wallet Adapter (Seed Vault / external wallet connect, Android)
  tld_parser: ^0.1.0 # AllDomains reverse resolution (.skr / .sol / any TLD) for the display name
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3
  http: ^1.2.2

  # design + motion + feel
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  rive: ^0.14.0 # current runtime (rive_native) - renders modern .riv files (0.13 crashes on newer fill rules)
  lottie: ^3.5.1 # .lottie (dotLottie) coin-rain
  confetti: ^0.8.0
  audioplayers: ^6.1.0
  vibration: ^2.0.1
  figma_squircle: ^0.6.3
  fluentui_system_icons: ^1.1.273

  # capability screens
  # mobile_scanner re-added in It2 (QR) with the iOS module/deployment fix; not imported yet.
  qr_flutter: ^4.1.0
  share_plus: ^10.1.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/sfx/
    - assets/branding/
    - assets/animations/
  fonts:
    - family: Clash Display
      fonts:
        - asset: assets/fonts/ClashDisplay-Semibold.ttf
          weight: 600
        - asset: assets/fonts/ClashDisplay-Bold.ttf
          weight: 700
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Regular.ttf
          weight: 400
        - asset: assets/fonts/Satoshi-Medium.ttf
          weight: 500
        - asset: assets/fonts/Satoshi-Bold.ttf
          weight: 700
        - asset: assets/fonts/Satoshi-Black.ttf
          weight: 900

# App icon (run: dart run flutter_launcher_icons) - the Quivo answer-cards mark.
# quivo-icon.png is the logo zoomed ~1.5x (padding trimmed) so the mark fills the tile.
flutter_launcher_icons:
  image_path: "assets/branding/quivo-icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 23
  adaptive_icon_background: "#0B0714"
  adaptive_icon_foreground: "assets/branding/quivo-icon.png"

# Launch splash (run: dart run flutter_native_splash:create) - logo centered on the dark mark bg,
# matching the icon so the boot reads as one piece before the light app appears.
# quivo-splash.png is quivo-logo.png trimmed + corner-masked to transparent (sharp) - the raw
# logo has its own opaque black canvas, which shows as a visible mismatched box against this
# screen's #0B0714 background otherwise.
flutter_native_splash:
  color: "#0B0714"
  image: "assets/branding/quivo-splash.png"
  android: true
  ios: true
  android_12:
    color: "#0B0714"
    image: "assets/branding/quivo-splash.png"
