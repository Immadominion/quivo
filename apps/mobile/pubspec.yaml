name: quivo
description: "Quivo — play a live game show on your phone, win real crypto on-chain."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # state + navigation (2026 recommended)
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # realtime (JSON gateway) + solana (throtl-proven)
  web_socket_channel: ^3.0.1
  solana: ^0.32.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3
  http: ^1.2.2

  # design + motion + feel
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  confetti: ^0.8.0
  audioplayers: ^6.1.0
  vibration: ^2.0.1

  # capability screens
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0
  share_plus: ^10.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/sfx/
