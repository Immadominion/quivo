[toolchain]
anchor_version = "1.0.2"

[features]
resolution = true
skip-lint = false

[programs.localnet]
quivo = "Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS"

[programs.devnet]
quivo = "Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
# Host-side unit tests for pure logic (no validator).
test = "cargo test --manifest-path programs/quivo/Cargo.toml --lib"

# NOTE: run `anchor keys sync` after the first `anchor build` to replace the placeholder program id
# above (and the declare_id! in lib.rs) with the real keypair id.
