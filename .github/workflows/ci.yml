name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: typecheck + build (ts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  onchain:
    name: anchor build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Anchor/Solana toolchain install is slow; enable once the program compiles locally.
      - run: echo "anchor build wired in follow-up (avm + solana toolchain cache)"
